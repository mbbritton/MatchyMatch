<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Background gradient: deep purple to blue -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5856d6"/>
      <stop offset="100%" stop-color="#007aff"/>
    </linearGradient>

    <!-- Tile gradients matching the 5 game categories -->
    <linearGradient id="yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd60a"/>
      <stop offset="100%" stop-color="#ffb800"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34c759"/>
      <stop offset="100%" stop-color="#28a745"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#47bfff"/>
      <stop offset="100%" stop-color="#007aff"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bf5af2"/>
      <stop offset="100%" stop-color="#9b59b6"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#ff2d55"/>
    </linearGradient>

    <!-- Drop shadow filter for tiles -->
    <filter id="tile-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle inner highlight at top -->
  <rect width="64" height="32" rx="14" fill="rgba(255,255,255,0.07)"/>
  <rect y="18" width="64" height="14" fill="rgba(255,255,255,0.07)"/>

  <!--
    5 tiles arranged in a cross / plus pattern — evoking a puzzle grid.
    Each tile uses one of the 5 category colors.
    Layout (center of 64×64):
      Top:    blue   (center-top)
      Left:   yellow
      Center: purple (center)
      Right:  green
      Bottom: pink
  -->

  <!-- Top tile — blue -->
  <rect x="22" y="8" width="20" height="16" rx="4" fill="url(#blue)" filter="url(#tile-shadow)"/>

  <!-- Left tile — yellow -->
  <rect x="6" y="24" width="16" height="16" rx="4" fill="url(#yellow)" filter="url(#tile-shadow)"/>

  <!-- Center tile — purple (slightly larger, hero tile) -->
  <rect x="22" y="24" width="20" height="16" rx="4" fill="url(#purple)" filter="url(#tile-shadow)"/>

  <!-- Right tile — green -->
  <rect x="42" y="24" width="16" height="16" rx="4" fill="url(#green)" filter="url(#tile-shadow)"/>

  <!-- Bottom tile — pink -->
  <rect x="22" y="40" width="20" height="16" rx="4" fill="url(#pink)" filter="url(#tile-shadow)"/>

  <!-- Shine overlay on each tile (top-left gloss) -->
  <rect x="22" y="8"  width="20" height="6"  rx="3" fill="rgba(255,255,255,0.22)"/>
  <rect x="6"  y="24" width="16" height="6"  rx="3" fill="rgba(255,255,255,0.22)"/>
  <rect x="22" y="24" width="20" height="6"  rx="3" fill="rgba(255,255,255,0.22)"/>
  <rect x="42" y="24" width="16" height="6"  rx="3" fill="rgba(255,255,255,0.22)"/>
  <rect x="22" y="40" width="20" height="6"  rx="3" fill="rgba(255,255,255,0.22)"/>
</svg>
